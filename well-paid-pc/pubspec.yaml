name: well_paid_pc
description: Well Paid — cliente desktop (Windows) para a mesma API FastAPI.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.6.2
  fl_chart: ^0.69.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  qr_flutter: ^4.1.0
  local_auth: ^2.3.0
  crypto: ^3.0.6
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  phosphor_flutter: ^2.1.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  windows:
    generate: true
    image_path: assets/images/playstore-icon.png
    icon_size: 256

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/app.env
    - assets/images/well_paid_logo.png
    - assets/images/playstore-icon.png
    - assets/images/login_logo.png
