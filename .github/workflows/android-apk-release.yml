# Compila o APK release (android-native) e publica no GitHub Releases.
#
# Disparo A — manual: Actions → "Android APK release" → Run workflow → preencher release_tag (ex.: v0.1.41).
#   Cria a tag no commit actual se ainda não existir e anexa o APK.
#
# Disparo B — por tag: git tag v0.1.41 && git push origin v0.1.41
#   Compila no commit da tag e anexa o APK à release dessa tag.
#
# Assinatura release (opcional): Settings -> Secrets and variables -> Actions
#   ANDROID_KEYSTORE_BASE64  — Base64 do .jks numa linha (se a UI truncar, usa PART1+PART2 em vez disto)
#   ANDROID_KEYSTORE_BASE64_PART1 + ANDROID_KEYSTORE_BASE64_PART2 — metades consecutivas (PART1+PART2 = Base64 completo)
#   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS
# Sem estes segredos, o job não grava keystore.properties no CI — o release pode usar assinatura de debug.
# Para produção, define os quatro segredos (não uses `if: secrets.*` no YAML; o GitHub não permite).
#
# Depois do release: actualiza backend/app/static/android-update.json com version_code e apk_url HTTPS do asset.

name: Android APK release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag da release (ex.: v0.1.41). Criada no HEAD actual se não existir."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android-native/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle.kts', 'android-native/**/*.properties', 'android-native/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Não usar `if: secrets.*` — o linter/GitHub rejeita `secrets` em expressões `if`.
      - name: Prepare release keystore (optional)
        working-directory: android-native
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_BASE64_PART1: ${{ secrets.ANDROID_KEYSTORE_BASE64_PART1 }}
          ANDROID_KEYSTORE_BASE64_PART2: ${{ secrets.ANDROID_KEYSTORE_BASE64_PART2 }}
          SP: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KP: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KA: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          $p1 = if ($null -ne $Env:ANDROID_KEYSTORE_BASE64_PART1) { ($Env:ANDROID_KEYSTORE_BASE64_PART1.Trim() -replace '\s+', '') } else { '' }
          $p2 = if ($null -ne $Env:ANDROID_KEYSTORE_BASE64_PART2) { ($Env:ANDROID_KEYSTORE_BASE64_PART2.Trim() -replace '\s+', '') } else { '' }
          $single = if ($null -ne $Env:ANDROID_KEYSTORE_BASE64) { ($Env:ANDROID_KEYSTORE_BASE64.Trim() -replace '\s+', '') } else { '' }
          $b64 = ''
          if ($p1.Length -gt 0) {
            $b64 = $p1 + $p2
            Write-Host "A usar secrets ANDROID_KEYSTORE_BASE64_PART1 + PART2 (total $($b64.Length) caracteres)."
          } elseif ($single.Length -gt 0) {
            $b64 = $single
            Write-Host "A usar secret ANDROID_KEYSTORE_BASE64 ($($b64.Length) caracteres)."
          } else {
            Write-Host "Sem Base64 do keystore nos secrets: nao escrevo keystore.properties (release pode usar assinatura de debug)."
            exit 0
          }
          if ($b64.Length -lt 1200) {
            Write-Host "AVISO: Base64 combinado tem so $($b64.Length) caracteres. Um .jks tipico costuma 2500+."
          }
          if ($p1.Length -eq 0 -and $b64.Length -gt 0 -and $b64.Length -lt 1200) {
            Write-Host "ERRO: ANDROID_KEYSTORE_BASE64_PART1 e PART2 estao vazios no repo, por isso o CI usa so ANDROID_KEYSTORE_BASE64 ($($b64.Length) chars) — valor truncado ou errado."
            Write-Host "No GitHub -> Settings -> Secrets -> Actions:"
            Write-Host "  Cria ANDROID_KEYSTORE_BASE64_PART1 = conteudo de gh-keystore-base64-part1-for-github.txt (corre Write-KeystoreBase64ForGithub.ps1 no PC)."
            Write-Host "  Cria ANDROID_KEYSTORE_BASE64_PART2 = conteudo de gh-keystore-base64-part2-for-github.txt"
            Write-Host "  Nomes exactos (case sensitive). Depois apaga o secret ANDROID_KEYSTORE_BASE64 ou cola la o ficheiro completo gh-keystore-base64-for-github.txt."
            Write-Host "  Preenche tambem ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS."
            exit 1
          }
          try {
            $bytes = [Convert]::FromBase64String($b64)
          } catch {
            Write-Host "Base64 invalido ($($b64.Length) chars): $($_.Exception.Message)"
            Write-Host "Cria ANDROID_KEYSTORE_BASE64_PART1 e PART2 (metades do ficheiro gh-keystore-base64-part*-for-github.txt) ou um unico ANDROID_KEYSTORE_BASE64 correcto."
            Write-Host "Confirma ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS no GitHub."
            exit 1
          }
          [IO.File]::WriteAllBytes((Join-Path $PWD "release-ci.jks"), $bytes)
          @"
          storePassword=$Env:SP
          keyPassword=$Env:KP
          keyAlias=$Env:KA
          storeFile=release-ci.jks
          "@ | Set-Content -Path keystore.properties -Encoding ascii

      - name: Assemble release APK
        working-directory: android-native
        shell: pwsh
        run: .\gradlew.bat :app:assembleRelease --no-daemon --stacktrace

      - name: Resolve release tag and copy APK
        id: meta
        shell: pwsh
        run: |
          $root = $Env:GITHUB_WORKSPACE
          $tag = if ($Env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            '${{ github.event.inputs.release_tag }}'.Trim()
          } else {
            $Env:GITHUB_REF_NAME
          }
          if ([string]::IsNullOrWhiteSpace($tag)) { throw "Tag vazia." }
          if ($tag -notmatch '^v') { throw "Use tag no formato v0.1.xx (ex.: v0.1.41)." }
          $src = Join-Path $root "android-native\app\build\outputs\apk\release\app-release.apk"
          if (-not (Test-Path $src)) { throw "APK não encontrado: $src" }
          $rel = "wellpaid-$tag.apk"
          $dest = Join-Path $root $rel
          Copy-Item -LiteralPath $src -Destination $dest -Force
          @(
            "release_tag=$tag",
            "asset_path=$rel"
          ) | Set-Content -Path $Env:GITHUB_OUTPUT -Encoding utf8NoBOM

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: Well Paid ${{ steps.meta.outputs.release_tag }}
          files: ${{ steps.meta.outputs.asset_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumo (android-update.json)
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.meta.outputs.release_tag }}"
          $url = "https://github.com/$repo/releases/download/$tag/wellpaid-$tag.apk"
          Add-Content -Path $Env:GITHUB_STEP_SUMMARY -Encoding utf8 -Value "## Próximo passo — manifesto da API"
          Add-Content -Path $Env:GITHUB_STEP_SUMMARY -Encoding utf8 -Value ""
          Add-Content -Path $Env:GITHUB_STEP_SUMMARY -Encoding utf8 -Value "Edita backend/app/static/android-update.json (deploy da API): version_code > app instalada; apk_url HTTPS ="
          Add-Content -Path $Env:GITHUB_STEP_SUMMARY -Encoding utf8 -Value $url
